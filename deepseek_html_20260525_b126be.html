<!DOCTYPE html>
<html lang="vi">
<head>

  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }

    .btn:active { transform: scale(.95); }
    .btn-green { background: #22c55e; color: #fff; }
    .btn-blue { background: #3b82f6; color: #fff; }

    .btn-red { background: #ef4444; color: #fff; }
    .btn-purple { background: #a855f7; color: #fff; }

    .cage-card { background: rgba(255,255,255,0.9); border-radius: 16px; padding: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-left: 4px solid #e5e7eb; }

    .profit-pos { color: #16a34a; font-weight: 700; }

    input, select, textarea { border: 1px solid #d1d5db; border-radius: 10px; padding: 8px 12px; width: 100%; font-size: 14px; outline: none; transition: border-color .2s; }
    input:focus, select:focus { border-color: #f97316; }
    label { font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 4px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
    .modal-box { background: #fff; border-radius: 24px 24px 0 0; padding: 24px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; animation: slideUp .25s ease; }
    @keyframes slideUp { from { transform: translateY(30px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .badge { display: inline-block; border-radius: 999px; padding: 2px 10px; font-size: 12px; font-weight: 700; }
    .badge-warning { background: #fee2e2; color: #b91c1c; }
    .badge-ok { background: #dcfce7; color: #15803d; }
    .badge-idle { background: #f1f5f9; color: #64748b; }
    #loadingScreen { position: fixed; inset: 0; background: rgba(255,255,255,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; flex-direction: column; gap: 12px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #f97316; border-radius: 50%; animation: spin .8s linear infinite; }

    .checklist-item:last-child { border-bottom: none; }
    .shift-title { font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #6b7280; margin-bottom: 8px; }

</head>

<script>
// =====================================================
// CONFIG
// =====================================================
const SUPABASE_URL = 'https://kmcdvbyttfsygqovefol.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImttY2R2Ynl0dGZzeWdxb3ZlZm9sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MTExODMsImV4cCI6MjA5NTI4NzE4M30.wTJ-dzOd49EWDnIYcMR4XQZ3ZlaatZYwY140Vj17gCA';

// =====================================================
// KHỞI TẠO SUPABASE — FIX lỗi supabaseJs undefined
// =====================================================
let db;
try {
  // supabase-js v2 UMD build expose qua window.supabase
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch(e) {
  showToast('❌ Không khởi tạo được Supabase: ' + e.message);
  console.error('Supabase init error:', e);
}

// =====================================================
// STATE
// =====================================================
let currentRole = null;
let tgToken = '', tgChatId = '';
let syncTimer = null;
let charts = {};

// =====================================================
// HELPERS
// =====================================================
function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display = 'none', duration);
}

function showLoading(show) {
  document.getElementById('loadingScreen').style.display = show ? 'flex' : 'none';
}

function today() {
  return new Date().toISOString().slice(0, 10);
}

function fmtDate(d) {
  if (!d) return '--';
  return d.slice(0, 10);
}

function fmtMoney(n) {
  return Number(n || 0).toLocaleString('vi-VN') + 'đ';
}

function addDays(dateStr, days) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function isPast(dateStr) {
  if (!dateStr) return false;
  return new Date(dateStr) < new Date();
}

// =====================================================
// MODAL SYSTEM — thay thế hoàn toàn prompt()
// =====================================================
function openModal(html, onClose) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'activeModal';
  overlay.innerHTML = `<div class="modal-box">${html}</div>`;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.getElementById('modalContainer').appendChild(overlay);
}

function closeModal() {
  const m = document.getElementById('activeModal');
  if (m) m.remove();
}

// =====================================================
// TELEGRAM
// =====================================================
async function sendTelegram(msg) {
  if (!tgToken || !tgChatId) return;
  try {
    await fetch(`https://api.telegram.org/bot${tgToken}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: tgChatId, text: msg, parse_mode: 'HTML' })
    });
  } catch(e) { console.warn('Telegram error:', e); }
}

// =====================================================
// LOGIN
// =====================================================
document.getElementById('btnHieu').addEventListener('click', () => loginAs('manager'));

document.getElementById('btnHenryShow').addEventListener('click', () => {
  document.getElementById('henryPassDiv').style.display = 'block';
  document.getElementById('henryPass').focus();
});

document.getElementById('btnHenryLogin').addEventListener('click', loginHenry);

document.getElementById('henryPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') loginHenry();
});

async function loginHenry() {
  if (!db) return showToast('❌ Supabase chưa sẵn sàng');
  showLoading(true);
  try {
    const { data, error } = await db.from('settings').select('value').eq('key', 'henry_password').single();
    if (error) throw error;
    const pass = document.getElementById('henryPass').value;
    if (data && data.value === pass) {
      loginAs('admin');
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } catch(e) {
    // Nếu chưa có bảng settings, cho phép mật khẩu mặc định
    const pass = document.getElementById('henryPass').value;
    if (pass === '0561') {
      loginAs('admin');
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  } finally {
    showLoading(false);
  }
}

function loginAs(role) {
  currentRole = role;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';

  const badge = document.getElementById('roleBadge');
  if (role === 'admin') {
    badge.textContent = '👑 Henry';
    badge.style.background = '#fef3c7';
    badge.style.color = '#92400e';
    // Admin thấy tất cả
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
  } else {
    badge.textContent = '👨‍🌾 Hiếu';
    badge.style.background = '#dcfce7';
    badge.style.color = '#166534';
    // Hiếu ẩn tab config và nút nhập tài chính
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
  }

  showTab('breeding');
  loadAll();
  syncTimer = setInterval(loadAll, 10000);
}

document.getElementById('btnLogout').addEventListener('click', () => {
  clearInterval(syncTimer);
  location.reload();
});

document.getElementById('btnSync').addEventListener('click', async () => {
  await loadAll();
  showToast('✅ Đã đồng bộ');
});

// =====================================================
// TAB SYSTEM
// =====================================================
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => showTab(btn.dataset.tab));
});

function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const panel = document.getElementById(name);
  if (panel) panel.style.display = 'block';
  const btn = document.querySelector(`.tab-btn[data-tab="${name}"]`);
  if (btn) btn.classList.add('active');
}

// =====================================================
// LOAD ALL DATA
// =====================================================
async function loadAll() {
  if (!db) return;
  await Promise.all([
    loadBreeding(),
    loadPhong(),
    loadAV(),
    loadChecklist(),
    loadInventory(),
  ]);
  if (currentRole === 'admin') loadConfig();
}

// =====================================================
// BREEDING CAGES
// =====================================================
async function loadBreeding() {
  const { data, error } = await db.from('cages').select('*').eq('type', 'breeding').order('code');
  if (error) { console.error(error); return; }
  const list = document.getElementById('breedingList');
  if (!data || data.length === 0) {
    list.innerHTML = '<div style="color:#6b7280;text-align:center;padding:20px">Chưa có lồng sinh sản. Thêm dữ liệu mẫu qua SQL Editor.</div>';
    return;
  }
  list.innerHTML = '';
  data.forEach(cage => {
    const warnings = [];
    if (isPast(cage.expected_hatch_date) && cage.hatched_count < cage.eggs_count) warnings.push('Quá ngày nở');
    if (isPast(cage.expected_separate_date) && cage.live_chicks > 0) warnings.push('Quá ngày tách');
    if (isPast(cage.expected_rebreed_date)) warnings.push('Nên ghép lại');

    const hasData = cage.pairing_date || cage.eggs_count > 0;
    const cardClass = warnings.length ? 'has-warning' : (hasData ? 'active' : '');

    const card = document.createElement('div');
    card.className = `cage-card ${cardClass}`;
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div style="font-size:17px;font-weight:800;color:#1e293b">${cage.code}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
          ${warnings.length
            ? warnings.map(w => `<span class="badge badge-warning">${w}</span>`).join('')
            : hasData ? '<span class="badge badge-ok">✓ Đang sinh sản</span>' : '<span class="badge badge-idle">Chờ ghép cặp</span>'}
        </div>
      </div>
      <div style="font-size:13px;color:#374151;line-height:1.8">
        <span>🐦 Trống: <b>${cage.male_color || '—'}</b></span> &nbsp;
        <span>🐦 Mái: <b>${cage.female_color || '—'}</b></span><br>
        <span>📅 Ghép: ${fmtDate(cage.pairing_date)}</span> &nbsp;
        <span>🥚 Ngày đẻ đầu: ${fmtDate(cage.first_egg_date)}</span><br>
        <span>🥚 Trứng: ${cage.eggs_count || 0}</span> &nbsp;
        <span>🐣 Nở: ${cage.hatched_count || 0}</span> &nbsp;
        <span>🐥 Sống: ${cage.live_chicks || 0}</span><br>
        ${cage.expected_hatch_date ? `<span>📌 Dự nở: ${fmtDate(cage.expected_hatch_date)}</span><br>` : ''}
        ${cage.health_status ? `<span>❤️ Sức khoẻ: ${cage.health_status}</span><br>` : ''}
      </div>
      <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
        <button class="btn btn-blue" onclick="openDailyLog('${cage.code}')">📝 Nhật ký</button>
        <button class="btn btn-green" onclick="editBreedingCage('${cage.code}')">✏️ Sửa</button>
      </div>
    `;
    list.appendChild(card);
  });
}

document.getElementById('btnAddBreeding').addEventListener('click', () => {

async function submitDailyLog(code) {

  const note = document.getElementById('m_logNote').value.trim();
  if (!note) return showToast('Viết gì đó vào ghi chú đi!');

  let imageUrl = '';
  const fileInput = document.getElementById('m_logPhoto');
  const file = fileInput.files[0];

  showLoading(true);
  try {
    if (file) {
      const compressed = await imageCompression(file, { maxSizeMB: 0.5, maxWidthOrHeight: 1200 });
      const fileName = `${code}_${logDate}_${Date.now()}.jpg`;
      const { error: upErr } = await db.storage.from('bird_images').upload(fileName, compressed, { upsert: true });
      if (!upErr) {
        imageUrl = db.storage.from('bird_images').getPublicUrl(fileName).data.publicUrl;
      }
    }

    const { error } = await db.from('daily_logs').upsert({
      cage_code: code,
      log_date: logDate,
      note,
      image_url: imageUrl
    });
    if (error) throw error;

    closeModal();
    showToast('✅ Đã lưu nhật ký');
    sendTelegram(`📝 [NHẬT KÝ ${code} - ${logDate}]\n${note}${imageUrl ? '\n🖼 ' + imageUrl : ''}`);
  } catch(e) {
    showToast('❌ Lỗi: ' + e.message);
  } finally {
    showLoading(false);
  }
}

    bird_type: 'phong',
    color: birdColor,
    quantity: qty,
    unit_price: price,
    total_amount: qty * price,

  });

  // Cập nhật lại số lượng

  await db.from('cages').update({ current_quantity: count || 0 }).eq('code', cageCode);

const SHIFT_LABELS = { sang: '☀️ Ca sáng', chieu: '🌤 Ca chiều', toi: '🌙 Ca tối', tuan: '📅 Hàng tuần', khan_cap: '🚨 Khẩn cấp' };

async function loadChecklist() {
  const { data: items } = await db.from('checklist_items').select('*').order('order_index');
  const { data: completions } = await db.from('checklist_completions').select('*').eq('shift_date', today());

  if (!items) return;

  const shifts = { sang: [], chieu: [], toi: [], tuan: [], khan_cap: [] };
  items.forEach(it => { if (shifts[it.shift]) shifts[it.shift].push(it); });

  let html = '';
  for (const [shift, list] of Object.entries(shifts)) {
    if (list.length === 0) continue;
    const doneCount = list.filter(it => completions && completions.find(c => c.item_id === it.id)).length;
    html += `
      <div class="card p-4 mb-3">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-weight:700">${SHIFT_LABELS[shift] || shift}</div>
          <div style="font-size:12px;color:#6b7280">${doneCount}/${list.length} hoàn thành</div>
        </div>
    `;
    list.forEach(item => {
      const done = completions && completions.find(c => c.item_id === item.id);
      html += `
        <div class="checklist-item">
          <div>
            <span>${item.title}</span>
            ${item.is_urgent ? '<span class="badge badge-warning" style="margin-left:6px">Khẩn</span>' : ''}
            ${done ? `<div style="font-size:11px;color:#22c55e">✓ ${done.completed_by} lúc ${new Date(done.completed_at).toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'})}</div>` : ''}
          </div>
          ${!done && currentRole === 'manager'
            ? `<button class="btn btn-green" style="padding:4px 12px;font-size:13px" onclick="completeItem(${item.id}, '${shift}')">✓ Xong</button>`
            : done ? '' : '<span style="color:#9ca3af;font-size:13px">—</span>'}
          ${currentRole === 'admin' && !done ? `<button class="btn btn-red" style="padding:4px 8px;font-size:12px" onclick="deleteChecklistItem(${item.id})">🗑</button>` : ''}
        </div>
      `;
    });
    html += '</div>';
  }

  if (html === '') html = '<div style="color:#6b7280;text-align:center;padding:20px">Chưa có checklist. Thêm việc cần làm!</div>';
  document.getElementById('checklistContent').innerHTML = html;
}

async function completeItem(itemId, shift) {

  showToast('✅ Đã hoàn thành!');
  sendTelegram(`✅ [CA ${shift.toUpperCase()}] Hiếu hoàn thành lúc ${new Date().toLocaleTimeString('vi-VN')}`);

async function loadInventory() {
  // Vật tư
  const { data: items } = await db.from('inventory_items').select('*');
  let invHtml = '';
  (items || []).forEach(it => {
    invHtml += `
      <div class="cage-card" style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:700">${it.name}</div>
          <div style="font-size:13px;color:#6b7280">Tồn: <b>${it.current_stock} ${it.unit || ''}</b> &nbsp;|&nbsp; Đơn giá: ${fmtMoney(it.unit_price)}</div>
        </div>
        ${currentRole === 'manager' ? `<button class="btn btn-yellow" style="white-space:nowrap" onclick="reportStock(${it.id}, ${it.current_stock}, ${it.unit_price})">📦 Báo tồn</button>` : ''}
      </div>
    `;
  });
  document.getElementById('inventoryContent').innerHTML = invHtml || '<div style="color:#9ca3af">Chưa có vật tư.</div>';

  // Doanh thu (5 gần nhất)
  const { data: sales } = await db.from('sales').select('*').order('sale_date', { ascending: false }).limit(10);
  const totalRev = (sales || []).reduce((s, x) => s + (x.total_amount || 0), 0);
  document.getElementById('salesContent').innerHTML = (sales || []).map(s => `
    <div class="cage-card" style="font-size:13px">
      <div style="display:flex;justify-content:space-between">
        <b>${s.sale_date}</b>
        <span class="profit-pos">${fmtMoney(s.total_amount)}</span>
      </div>
      <div>${s.quantity} con ${s.color} — ${s.customer_name || '—'} — ${s.carrier || '—'}</div>
    </div>
  `).join('') || '<div style="color:#9ca3af">Chưa có đơn hàng.</div>';

  // Chi phí
  const { data: costs } = await db.from('investment_costs').select('*').order('cost_date', { ascending: false }).limit(10);
  const totalCost = (costs || []).reduce((s, x) => s + (x.amount || 0), 0);
  document.getElementById('costsContent').innerHTML = (costs || []).map(c => `
    <div class="cage-card" style="font-size:13px">
      <div style="display:flex;justify-content:space-between">
        <b>${c.cost_date}</b>
        <span class="profit-neg">-${fmtMoney(c.amount)}</span>
      </div>
      <div>${c.category}: ${c.description}</div>
    </div>
  `).join('') || '<div style="color:#9ca3af">Chưa có chi phí nào.</div>';

  // Lợi nhuận
  const profit = totalRev - totalCost;
  const pv = document.getElementById('profitVal');
  pv.textContent = (profit >= 0 ? '+' : '') + fmtMoney(profit);
  pv.className = profit >= 0 ? 'profit-pos' : 'profit-neg';
  pv.style.fontSize = '28px';

  // Charts
  renderCharts(sales, costs);
}

function renderCharts(sales, costs) {
  // Profit chart
  const ctx = document.getElementById('profitChart');
  if (charts.profit) charts.profit.destroy();
  const months = [];
  const revByMonth = {};
  const costByMonth = {};
  (sales || []).forEach(s => {
    const m = s.sale_date.slice(0, 7);
    revByMonth[m] = (revByMonth[m] || 0) + s.total_amount;
    if (!months.includes(m)) months.push(m);
  });
  (costs || []).forEach(c => {
    const m = c.cost_date.slice(0, 7);
    costByMonth[m] = (costByMonth[m] || 0) + c.amount;
    if (!months.includes(m)) months.push(m);
  });
  months.sort();
  charts.profit = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months.length ? months : ['Chưa có dữ liệu'],
      datasets: [
        { label: 'Doanh thu', data: months.map(m => revByMonth[m] || 0), backgroundColor: '#86efac' },
        { label: 'Chi phí', data: months.map(m => costByMonth[m] || 0), backgroundColor: '#fca5a5' },
      ]
    },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  });
}

  const consumption = oldStock - newStock;
  await db.from('inventory_reports').insert({
    item_id: itemId,
    reported_date: today(),
    old_stock: oldStock,
    new_stock: newStock,
    consumption,
    cost: consumption * unitPrice
  });
  await db.from('inventory_items').update({ current_stock: newStock }).eq('id', itemId);
  closeModal();
  showToast('✅ Đã cập nhật tồn kho');
  loadInventory();
}

async function submitAddSaleDirect() {

async function loadConfig() {
  const { data: t } = await db.from('settings').select('value').eq('key', 'telegram_token').single();
  const { data: c } = await db.from('settings').select('value').eq('key', 'telegram_chatid').single();
  if (t) { tgToken = t.value; const el = document.getElementById('cfgBotToken'); if(el) el.value = t.value; }
  if (c) { tgChatId = c.value; const el = document.getElementById('cfgChatId'); if(el) el.value = c.value; }
}

document.getElementById('btnChangePass').addEventListener('click', async () => {
  const np = document.getElementById('newPass').value;
  if (!np) return showToast('Nhập mật khẩu mới!');
  await db.from('settings').upsert({ key: 'henry_password', value: np });
  showToast('✅ Đã đổi mật khẩu');
});

document.getElementById('btnSaveTelegram').addEventListener('click', async () => {
  const token = document.getElementById('cfgBotToken').value;
  const chatid = document.getElementById('cfgChatId').value;
  await db.from('settings').upsert({ key: 'telegram_token', value: token });
  await db.from('settings').upsert({ key: 'telegram_chatid', value: chatid });
  tgToken = token; tgChatId = chatid;
  showToast('✅ Đã lưu cấu hình Telegram');
});

document.getElementById('btnSendReport').addEventListener('click', async () => {
  const { data: sales } = await db.from('sales').select('total_amount').eq('sale_date', today());
  const rev = (sales || []).reduce((s, x) => s + x.total_amount, 0);
  const { data: breeding } = await db.from('cages').select('code,live_chicks').eq('type', 'breeding');
  const totalChicks = (breeding || []).reduce((s, x) => s + (x.live_chicks || 0), 0);
  await sendTelegram(`📊 [TỔNG KẾT NGÀY ${today()}]\n💰 Doanh thu hôm nay: ${fmtMoney(rev)}\n🐥 Tổng chim non đang có: ${totalChicks} con\n⏰ Gửi lúc: ${new Date().toLocaleTimeString('vi-VN')}`);
  showToast('✅ Đã gửi báo cáo Telegram');
});
